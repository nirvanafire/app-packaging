name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== Windows x64 Build ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert icon to ICO format
        run: |
          python -c "
          from PIL import Image
          import os
          if os.path.exists('icon.png'):
              img = Image.open('icon.png')
              sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
              img.save('icon.ico', format='ICO', sizes=sizes)
              print('Created icon.ico')
          "

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --onefile --windowed --name PyQt6Demo --icon icon.ico --add-data "src;src" --add-data "icon.png;icon.png" src/main.py

      - name: Create distribution package
        run: |
          mkdir dist/package
          cp dist/PyQt6Demo.exe dist/package/
          cp README.md dist/package/ 2>$null
          cp LICENSE dist/package/ 2>$null
          cd dist/package
          7z a -tzip ../../PyQt6Demo-Windows-x64.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: PyQt6Demo-Windows-x64.zip

  # ==================== Windows ARM Build ====================
  build-windows-arm:
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert icon to ICO format
        run: |
          python -c "
          from PIL import Image
          import os
          if os.path.exists('icon.png'):
              img = Image.open('icon.png')
              sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
              img.save('icon.ico', format='ICO', sizes=sizes)
              print('Created icon.ico')
          "

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --onefile --windowed --name PyQt6Demo --icon icon.ico --add-data "src;src" --add-data "icon.png;icon.png" src/main.py

      - name: Create distribution package
        run: |
          mkdir dist/package
          cp dist/PyQt6Demo.exe dist/package/
          cp README.md dist/package/ 2>$null
          cp LICENSE dist/package/ 2>$null
          cd dist/package
          7z a -tzip ../../PyQt6Demo-Windows-ARM64.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm-build
          path: PyQt6Demo-Windows-ARM64.zip

  # ==================== macOS Apple Silicon Build ====================
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert icon to ICNS format
        run: |
          python -c "
          from PIL import Image
          import os
          if os.path.exists('icon.png'):
              img = Image.open('icon.png')
              # Create iconset directory
              os.makedirs('icon.iconset', exist_ok=True)
              sizes = [16, 32, 128, 256, 512]
              for s in sizes:
                  resized = img.resize((s, s), Image.Resampling.LANCZOS)
                  resized.save(f'icon.iconset/icon_{s}x{s}.png')
                  if s <= 256:
                      resized2x = img.resize((s*2, s*2), Image.Resampling.LANCZOS)
                      resized2x.save(f'icon.iconset/icon_{s}x{s}@2x.png')
              print('Created icon.iconset')
          "
          # Convert to icns using macOS tool
          iconutil -c icns icon.iconset -o icon.icns || echo "icon.icns creation failed, using fallback"

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "PyQt6Demo" \
            --icon "icon.icns" \
            --add-data "src:src" \
            --add-data "icon.png:icon.png" \
            src/main.py

      - name: Create .app bundle structure
        run: |
          mkdir -p dist/PyQt6Demo.app/Contents/MacOS
          mkdir -p dist/PyQt6Demo.app/Contents/Resources
          cp dist/PyQt6Demo dist/PyQt6Demo.app/Contents/MacOS/PyQt6Demo
          chmod +x dist/PyQt6Demo.app/Contents/MacOS/PyQt6Demo
          # Copy icon to Resources
          cp icon.icns dist/PyQt6Demo.app/Contents/Resources/icon.icns 2>/dev/null || true
          
          cat > dist/PyQt6Demo.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>PyQt6Demo</string>
              <key>CFBundleDisplayName</key>
              <string>PyQt6 Demo</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.pyqt6demo</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleExecutable</key>
              <string>PyQt6Demo</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          EOF

      - name: Fix permissions for distribution
        run: |
          xattr -cr dist/PyQt6Demo.app
          chmod -R 755 dist/PyQt6Demo.app

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "PyQt6Demo" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "PyQt6Demo.app" 150 190 \
            --hide-extension "PyQt6Demo.app" \
            --app-drop-link 450 190 \
            "PyQt6Demo-macOS.dmg" \
            "dist/PyQt6Demo.app" || \
          hdiutil create -volname "PyQt6Demo" -srcfolder dist/PyQt6Demo.app -ov -format UDZO PyQt6Demo-macOS.dmg

      - name: Fix DMG permissions
        run: |
          xattr -cr PyQt6Demo-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: PyQt6Demo-macOS.dmg

  # ==================== Linux Build ====================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "PyQt6Demo" \
            --add-data "src:src" \
            --add-data "icon.png:icon.png" \
            src/main.py

      - name: Create distribution package
        run: |
          mkdir -p dist/package
          cp dist/PyQt6Demo dist/package/
          chmod +x dist/package/PyQt6Demo
          cp README.md dist/package/ 2>/dev/null || true
          cp LICENSE dist/package/ 2>/dev/null || true
          cd dist/package
          tar -czvf ../../PyQt6Demo-Linux-x64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: PyQt6Demo-Linux-x64.tar.gz

  # ==================== Create Release ====================
  create-release:
    needs: [build-windows, build-windows-arm, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## PyQt6 Demo Application ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载说明
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows (x64) | `PyQt6Demo-Windows-x64.zip` | Intel/AMD 64位处理器 |
            | Windows (ARM64) | `PyQt6Demo-Windows-ARM64.zip` | ARM64 处理器 |
            | macOS | `PyQt6Demo-macOS.dmg` | Apple Silicon (M1/M2/M3/M4) |
            | Linux | `PyQt6Demo-Linux-x64.tar.gz` | 64位 Linux |
            
            ### 系统要求
            
            - **Windows x64**: Windows 10/11 64位
            - **Windows ARM64**: Windows 11 on ARM
            - **macOS**: macOS 11.0+ (Apple Silicon)
            - **Linux**: 现代 Linux 发行版
            
            ### 更新内容
            
            - 添加应用图标支持
            - 优化 UI 布局
            
            ### macOS 首次运行说明
            
            如果提示"已损坏"，在终端运行：
            ```bash
            xattr -cr /Applications/PyQt6Demo.app
            ```
          draft: false
          prerelease: false
          files: |
            artifacts/windows-build/PyQt6Demo-Windows-x64.zip
            artifacts/windows-arm-build/PyQt6Demo-Windows-ARM64.zip
            artifacts/macos-build/PyQt6Demo-macOS.dmg
            artifacts/linux-build/PyQt6Demo-Linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

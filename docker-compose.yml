version: '3.8'

services:
  web:
    image: ${DOCKER_IMAGE:-pyqt6-web-app:latest}
    container_name: pyqt6-web
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
